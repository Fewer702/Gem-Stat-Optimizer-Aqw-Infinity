<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gem Stat Optimizer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeecea;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9a9a96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.25);
    --info-bg: #e6f1fb; --info-text: #185fa5; --info-border: rgba(24,95,165,0.35);
    --danger-bg: #fcebeb; --danger-text: #a32d2d; --danger-border: rgba(163,45,45,0.35);
    --success-bg: #eaf3de; --success-text: #3b6d11; --success-border: rgba(59,109,17,0.35);
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #f0ede8; --text2: #a0a09a; --text3: #6a6a65;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.25);
      --info-bg: #0c2a4a; --info-text: #85b7eb; --info-border: rgba(133,183,235,0.3);
      --danger-bg: #3a1010; --danger-text: #f09595; --danger-border: rgba(240,149,149,0.3);
      --success-bg: #142808; --success-text: #97c459; --success-border: rgba(151,196,89,0.3);
    }
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 780px; margin: 0 auto; }
  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  .app-title { font-size: 24px; font-weight: 600; }
  .app-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .save-badge { font-size: 12px; color: var(--success-text); background: var(--success-bg); border: 0.5px solid var(--success-border); padding: 4px 10px; border-radius: 99px; display: none; }
  .card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--text2); font-weight: 600; }
  select, input[type=number] { height: 36px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); padding: 0 10px; font-size: 13px; outline: none; }
  select:focus, input:focus { border-color: var(--info-text); box-shadow: 0 0 0 2px var(--info-bg); }
  input[type=number] { width: 60px; }
  select { min-width: 106px; }
  .btn { height: 36px; padding: 0 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; transition: background .1s; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.98); }
  .btn-add { border-color: var(--info-border); color: var(--info-text); }
  .btn-add:hover { background: var(--info-bg); }
  .btn-danger { border-color: var(--danger-border); color: var(--danger-text); }
  .btn-danger:hover { background: var(--danger-bg); }
  .two-col { display: grid; grid-template-columns: minmax(0,1.3fr) minmax(0,1fr); gap: 12px; margin-bottom: 1rem; }
  @media (max-width: 560px) { .two-col { grid-template-columns: 1fr; } }
  .bag-section { margin-bottom: 10px; }
  .bag-section-title { font-size: 12px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .gem-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 7px 4px 5px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg2); margin: 2px; cursor: pointer; font-size: 12px; color: var(--text); transition: border-color .15s, background .15s; }
  .gem-pill:hover { border-color: var(--info-border); background: var(--info-bg); }
  .gem-pill.equipped { border: 1.5px solid var(--success-border); background: var(--success-bg); }
  .gem-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 99px; }
  .remove-gem { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; padding: 0; line-height: 1; margin-left: 1px; }
  .remove-gem:hover { color: var(--danger-text); }
  .equip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .equip-slot { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: .75rem; transition: border-color .2s; }
  .equip-slot.filled { border-color: var(--success-border); }
  .equip-slot-name { font-size: 12px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .slot-empty-text { font-size: 12px; color: var(--text3); }
  .unequip-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; padding: 0; line-height: 1; }
  .unequip-btn:hover { color: var(--danger-text); }
  .mini-chip { font-size: 11px; padding: 1px 5px; border-radius: 99px; background: var(--bg2); color: var(--text2); display: inline-block; margin: 1px; }
  .stat-row { display: grid; grid-template-columns: 82px 1fr 42px; align-items: center; gap: 10px; margin-bottom: 8px; }
  .stat-label { font-size: 13px; color: var(--text2); font-weight: 600; }
  .bar-track { height: 9px; border-radius: 99px; background: var(--bg2); border: 0.5px solid var(--border); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width .35s ease; }
  .stat-val { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; }
  .total-row { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .bag-empty { font-size: 13px; color: var(--text3); }
</style>
</head>
<body>
<div class="container">

  <div class="app-header">
    <div>
      <div class="app-title">Gem Stat Optimizer</div>
      <div class="app-subtitle">AQW: Infinity — inventory auto-saves to this browser</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="save-badge" id="saveBadge"><i class="ti ti-device-floppy"></i> Saved</span>
      <button class="btn btn-danger" onclick="clearAll()"><i class="ti ti-trash"></i> Clear all</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Add gem to bag</div>
    <div class="input-row">
      <div class="field"><label>Slot</label>
        <select id="bagSlot"><option>Weapon</option><option>Armor</option><option>Helm</option><option>Cape</option></select>
      </div>
      <div class="field"><label>Class</label>
        <select id="bagClass"><option>Fighter</option><option>Wizard</option><option>Thief</option><option>Healer</option><option>Lucky</option></select>
      </div>
      <div class="field"><label>STR</label><input type="number" id="b0" min="0" value="0"></div>
      <div class="field"><label>END</label><input type="number" id="b1" min="0" value="0"></div>
      <div class="field"><label>DEX</label><input type="number" id="b2" min="0" value="0"></div>
      <div class="field"><label>INT</label><input type="number" id="b3" min="0" value="0"></div>
      <div class="field"><label>WIS</label><input type="number" id="b4" min="0" value="0"></div>
      <div class="field"><label>LCK</label><input type="number" id="b5" min="0" value="0"></div>
      <button class="btn btn-add" onclick="addToBag()"><i class="ti ti-plus"></i> Add to bag</button>
    </div>
  </div>

  <div class="two-col">
    <div class="card" style="margin-bottom:0">
      <div class="section-label">Bag inventory</div>
      <div id="bagEl"><span class="bag-empty">No gems yet.</span></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="section-label">Equipment</div>
      <div class="equip-grid">
        <div class="equip-slot" id="slot-Weapon">
          <div class="equip-slot-name"><i class="ti ti-sword" style="font-size:14px"></i> Weapon</div>
          <div id="content-Weapon"><span class="slot-empty-text">Empty</span></div>
        </div>
        <div class="equip-slot" id="slot-Armor">
          <div class="equip-slot-name"><i class="ti ti-shield" style="font-size:14px"></i> Armor</div>
          <div id="content-Armor"><span class="slot-empty-text">Empty</span></div>
        </div>
        <div class="equip-slot" id="slot-Helm">
          <div class="equip-slot-name"><i class="ti ti-hardhat" style="font-size:14px"></i> Helm</div>
          <div id="content-Helm"><span class="slot-empty-text">Empty</span></div>
        </div>
        <div class="equip-slot" id="slot-Cape">
          <div class="equip-slot-name"><i class="ti ti-wind" style="font-size:14px"></i> Cape</div>
          <div id="content-Cape"><span class="slot-empty-text">Empty</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Total equipped stats</div>
    <div id="statBars"></div>
    <div class="total-row">
      <span style="font-size:13px;color:var(--text2);font-weight:600">Overall total</span>
      <span style="font-size:22px;font-weight:700;color:var(--text)" id="grandTotal">0</span>
    </div>
  </div>

</div>
<script>
const STATS = ['STR','END','DEX','INT','WIS','LCK'];
const BAR_COLORS = ['#D85A30','#1D9E75','#888780','#7F77DD','#639922','#BA7517'];
const CLASS_COLORS = {
  Fighter:{bg:'#F5C4B3',text:'#712B13'},
  Wizard:{bg:'#CECBF6',text:'#3C3489'},
  Thief:{bg:'#D3D1C7',text:'#444441'},
  Healer:{bg:'#9FE1CB',text:'#085041'},
  Lucky:{bg:'#FAC775',text:'#633806'},
};
const SLOT_ICONS = {Weapon:'ti-sword',Armor:'ti-shield',Helm:'ti-hardhat',Cape:'ti-wind'};
const SLOTS = ['Weapon','Armor','Helm','Cape'];
const STORAGE_KEY = 'aqw_gem_optimizer_v1';

let bag = [];
let equipped = {Weapon:null,Armor:null,Helm:null,Cape:null};
let nextId = 0;
let saveBadgeTimer = null;

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({bag, equipped, nextId}));
    const badge = document.getElementById('saveBadge');
    badge.style.display = 'inline-flex';
    clearTimeout(saveBadgeTimer);
    saveBadgeTimer = setTimeout(()=>badge.style.display='none', 2000);
  } catch(e) {}
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    bag = data.bag || [];
    equipped = data.equipped || {Weapon:null,Armor:null,Helm:null,Cape:null};
    nextId = data.nextId || 0;
  } catch(e) {}
}

function addToBag() {
  const slot = document.getElementById('bagSlot').value;
  const cls = document.getElementById('bagClass').value;
  const vals = STATS.map((_,i)=>parseInt(document.getElementById('b'+i).value)||0);
  bag.push({id:nextId++, slot, cls, vals});
  saveData();
  render();
  STATS.forEach((_,i)=>document.getElementById('b'+i).value=0);
}

function clearAll() {
  if (!confirm('Clear all gems and reset equipment?')) return;
  bag = [];
  SLOTS.forEach(s=>equipped[s]=null);
  saveData();
  render();
}

function equipGem(id) {
  const gem = bag.find(g=>g.id===id);
  if (!gem) return;
  equipped[gem.slot] = equipped[gem.slot] === id ? null : id;
  saveData();
  render();
}

function unequip(slot, e) {
  e.stopPropagation();
  equipped[slot] = null;
  saveData();
  render();
}

function removeFromBag(id, e) {
  e.stopPropagation();
  SLOTS.forEach(s=>{ if(equipped[s]===id) equipped[s]=null; });
  bag = bag.filter(g=>g.id!==id);
  saveData();
  render();
}

function render() {
  const bagEl = document.getElementById('bagEl');
  if (bag.length === 0) {
    bagEl.innerHTML = '<span class="bag-empty">No gems yet.</span>';
  } else {
    const bySlot = {};
    SLOTS.forEach(s=>bySlot[s]=[]);
    bag.forEach(g=>bySlot[g.slot].push(g));
    bagEl.innerHTML = SLOTS.filter(s=>bySlot[s].length>0).map(s=>{
      const pills = bySlot[s].map(gem=>{
        const c = CLASS_COLORS[gem.cls];
        const isEq = equipped[gem.slot] === gem.id;
        const stats = STATS.map((st,i)=>gem.vals[i]>0?`${st}${gem.vals[i]}`:'').filter(Boolean).join(' ');
        return `<div class="gem-pill${isEq?' equipped':''}" onclick="equipGem(${gem.id})" title="${isEq?'Unequip':'Equip to '+gem.slot}">
          <span class="gem-badge" style="background:${c.bg};color:${c.text}">${gem.cls}</span>
          <span style="color:var(--text2);font-size:11px">${stats||'—'}</span>
          ${isEq?'<i class="ti ti-check" style="font-size:11px;color:var(--success-text)"></i>':''}
          <button class="remove-gem" onclick="removeFromBag(${gem.id},event)" aria-label="Remove">×</button>
        </div>`;
      }).join('');
      return `<div class="bag-section">
        <div class="bag-section-title"><i class="ti ${SLOT_ICONS[s]}" style="font-size:13px"></i>${s} (${bySlot[s].length})</div>
        ${pills}
      </div>`;
    }).join('');
  }

  SLOTS.forEach(slot=>{
    const slotEl = document.getElementById('slot-'+slot);
    const contentEl = document.getElementById('content-'+slot);
    const gId = equipped[slot];
    const gem = (gId !== null && gId !== undefined) ? bag.find(g=>g.id===gId) : null;
    if (gem) {
      const c = CLASS_COLORS[gem.cls];
      const chips = STATS.map((s,i)=>gem.vals[i]>0?`<span class="mini-chip">${s} ${gem.vals[i]}</span>`:'').filter(Boolean).join('');
      contentEl.innerHTML = `<div style="display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap">
        <span class="gem-badge" style="background:${c.bg};color:${c.text};font-size:10px;padding:2px 6px;border-radius:99px">${gem.cls}</span>
        ${chips}
        <button class="unequip-btn" onclick="unequip('${slot}',event)" aria-label="Unequip">×</button>
      </div>`;
      slotEl.classList.add('filled');
    } else {
      const avail = bag.filter(g=>g.slot===slot).length;
      contentEl.innerHTML = `<span class="slot-empty-text">${avail>0?avail+' available in bag':'Empty'}</span>`;
      slotEl.classList.remove('filled');
    }
  });

  const totals = [0,0,0,0,0,0];
  SLOTS.forEach(slot=>{
    const gId = equipped[slot];
    if (gId === null || gId === undefined) return;
    const gem = bag.find(g=>g.id===gId);
    if (gem) gem.vals.forEach((v,i)=>totals[i]+=v);
  });
  const grand = totals.reduce((a,b)=>a+b,0);
  const maxStat = Math.max(...totals,1);
  document.getElementById('statBars').innerHTML = STATS.map((s,i)=>`
    <div class="stat-row">
      <span class="stat-label">${s}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(totals[i]/maxStat*100)}%;background:${BAR_COLORS[i]}"></div></div>
      <span class="stat-val">${totals[i]}</span>
    </div>`).join('');
  document.getElementById('grandTotal').textContent = grand;
}

loadData();
render();
</script>
</body>
</html>
